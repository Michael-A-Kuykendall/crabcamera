name: 🦀 CrabCamera CI - Tests & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-and-coverage:
    name: Test Suite & Coverage
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]

    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v4

    - name: 🦀 Setup Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy

    - name: 💾 Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

    - name: 🧪 Run tests
      run: cargo test --all-features

    - name: 🔍 Run clippy
      run: cargo clippy --all-features -- -D warnings

    - name: 🎨 Check formatting
      run: cargo fmt -- --check

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      issues: write
      checks: write
    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v4

    - name: 🦀 Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: 🔧 Install cargo-audit
      run: cargo install cargo-audit

    - name: 🔒 Run security audit
      run: cargo audit

  publish-check:
    name: Publish Readiness Check
    runs-on: ubuntu-latest
    needs: [test-and-coverage]
    if: github.ref == 'refs/heads/main'

    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v4

    - name: 🦀 Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: 🎯 Test publish (dry run)
      run: cargo publish --dry-run

    - name: 📋 Generate release notes
      if: success()
      run: |
        echo "## 🦀 CrabCamera Release Ready" >> $GITHUB_STEP_SUMMARY
        echo "✅ All tests passing" >> $GITHUB_STEP_SUMMARY
        echo "✅ Crate publish ready" >> $GITHUB_STEP_SUMMARY